<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedro R. Carvalho</title>
  <meta name="description" content="Pedro R. Carvalho" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color-scheme: light;
      min-width: 360px;
    }

    body {
      background: #ffffff;
      color: #171717;
      -webkit-font-smoothing: antialiased;
      max-width: 42rem;
      margin: 0 auto;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 60vh;
    }

    .eyebrow {
      font-size: 0.75rem;
      color: #737373;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      color: #262626;
      letter-spacing: -0.025em;
      margin-bottom: 1.5rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
    }

    a.link {
      font-size: 0.875rem;
      color: #525252;
      text-decoration: none;
      border-bottom: 1px solid #e5e5e5;
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }

    a.link:hover {
      color: #171717;
      border-color: #a3a3a3;
    }

    a.link-arrow {
      font-size: 0.875rem;
      color: #a3a3a3;
      text-decoration: none;
      transition: color 0.15s;
    }

    a.link-arrow:hover { color: #525252; }

    footer { margin-bottom: 2rem; }

    @media (min-width: 640px) {
      body { padding: 2rem 0; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Pedro R. Carvalho</p>
    <h1>Hello.</h1>
    <div class="links">
      <a class="link" href="https://www.linkedin.com/in/pedrorcarvalho/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a class="link" href="https://github.com/pcarv" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a class="link-arrow" href="https://pcarv.vercel.app">Projects &rarr;</a>
    </div>
  </main>
  <footer></footer>
</body>
</html>
